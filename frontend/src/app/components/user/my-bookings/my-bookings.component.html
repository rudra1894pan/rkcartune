<div class="mx-auto max-w-4xl px-6 py-12">
  <p class="font-mono text-xs uppercase tracking-widest2 text-tuner-orange">My Garage</p>
  <h1 class="mt-1 font-display text-4xl uppercase tracking-wide text-text-primary">My Bookings</h1>

  <div *ngIf="loading" class="mt-8 space-y-3">
    <div *ngFor="let s of [1,2,3]" class="skeleton h-24 rounded-lg"></div>
  </div>

  <div *ngIf="!loading && errorMessage" class="mt-8 rounded-lg border border-tuner-orange/30 bg-tuner-orange/5 py-16 text-center text-text-muted">
    {{ errorMessage }}
  </div>

  <div *ngIf="!loading && !errorMessage && bookings.length === 0" class="mt-8 rounded-lg border border-dashed border-line py-16 text-center">
    <p class="font-body text-sm text-text-muted">You haven't requested any viewings yet. Browse the showroom to get started.</p>
  </div>

  <div *ngIf="!loading && bookings.length > 0" class="mt-8 space-y-4">
    <div *ngFor="let booking of bookings" class="flex items-center gap-4 rounded-lg border border-line bg-panel p-4 shadow-panel">
      <img [src]="imageFor(booking)" [alt]="booking.car.carName" class="h-20 w-28 rounded object-cover" />

      <div class="flex-1">
        <h3 class="font-display text-xl uppercase tracking-wide text-text-primary">{{ booking.car.brand }} {{ booking.car.carName }}</h3>
        <p class="font-mono text-xs text-text-muted">Visit requested: {{ booking.visitDate | date: 'mediumDate' }}</p>
        <p *ngIf="booking.message" class="mt-1 font-body text-xs text-text-muted italic">"{{ booking.message }}"</p>
      </div>

      <span [class]="'rounded-full border px-3 py-1 font-mono text-[10px] uppercase tracking-widest2 ' + statusClass(booking.status)">
        {{ booking.status }}
      </span>

      <button
        *ngIf="booking.status === 'pending'"
        (click)="cancel(booking)"
        class="font-mono text-xs uppercase tracking-widest2 text-text-muted hover:text-tuner-orange transition-colors"
      >
        Cancel
      </button>
    </div>
  </div>
</div>
